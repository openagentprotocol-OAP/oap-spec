# Gitleaks configuration for oap-spec.
# Extends the default ruleset and adds project-specific allowlists for
# documentation examples that look like secrets but are illustrative tokens.
[extend]
useDefault = true

[allowlist]
description = "Spec example tokens, idempotency identifiers, and SDK type annotations"
paths = [
  '''spec/v1\.0/OAP-CORE-1\.0\.md''',
  '''examples/.*''',
  '''rfcs/.*\.md''',
  '''sdks/.*''',
  '''reference/.*''',
  '''test-suite/.*''',
]
regexes = [
  '''oap_sub_(live|test)_[A-Za-z0-9]+''',
  '''01J[0-9A-HJKMNP-TV-Z]{23}''',
  '''Ed25519(Private|Public)Key''',
]
