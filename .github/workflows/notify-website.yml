name: Notify oap-website of spec change

on:
  push:
    branches: [main]
    paths:
      - 'rfcs/**'
      - 'papers/**'
      - 'spec/**'
      - 'schemas/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger oap-website rebuild
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/openagentprotocol-OAP/oap-website/dispatches \
            -f event_type=spec-updated \
            -f 'client_payload[source_sha]=${{ github.sha }}' \
            -f 'client_payload[source_ref]=${{ github.ref }}'
